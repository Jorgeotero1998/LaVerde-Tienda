services:
  - type: web
    name: laverde-backend
    region: oregon
    plan: free
    env: python
    rootDir: .
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: PYTHONPATH=src gunicorn "src.app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/hello
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FLASK_APP
        value: src/app.py
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: src
      - key: JWT_SECRET_KEY
        value: laverde-jwt-production-secret-32chars-min
      - key: FLASK_APP_KEY
        value: laverde-flask-production-secret-key
      - key: CORS_ORIGINS
        value: https://laverde-frontend.onrender.com,http://localhost:3000,http://127.0.0.1:3000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: laverde-frontend
    env: static
    rootDir: tienda-frontend
    buildCommand: |
      npm ci
      TSC_COMPILE_ON_ERROR=true npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://laverde-backend.onrender.com
