# render.yaml — Blueprint La Verde
# Colocar en la RAÍZ del repositorio
# Docs: https://render.com/docs/yaml-spec

databases:
  - name: laverde-db
    region: ohio
    plan: free
    ipAllowList: []

services:

  # ── 1. BACKEND — Flask + Gunicorn ──────────────────────────────────────────
  - type: web
    name: laverde-backend
    region: ohio
    plan: free
    env: python
    rootDir: .
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      flask db upgrade
    startCommand: gunicorn "src.app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laverde-db
          property: connectionString
      - key: FLASK_APP
        value: src/app.py
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_ENV
        value: production
      # — Definir en Dashboard de Render (no dejar vacíos) —
      - key: JWT_SECRET_KEY
        sync: false
      - key: FLASK_APP_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false   # ej: https://laverde-frontend.onrender.com
      # — Cloudinary (opcional) —
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── 2. FRONTEND — React CRA (Static Site) ──────────────────────────────────
  - type: web
    name: laverde-frontend
    region: ohio
    plan: free
    env: static
    rootDir: tienda-frontend
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: build    # CRA publica en /build (Vite usa /dist)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # — Definir en Dashboard de Render —
      - key: REACT_APP_BACKEND_URL
        sync: false   # ej: https://laverde-backend.onrender.com
