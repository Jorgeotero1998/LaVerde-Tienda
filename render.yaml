services:
    - type: web
      region: ohio
      name: laverde-backend
      env: python
      buildCommand: "./render_build.sh"
      startCommand: "gunicorn wsgi --chdir ./src/"
      plan: free
      numInstances: 1
      envVars:
          - key: FLASK_APP
            value: src/app.py
          - key: FLASK_DEBUG
            value: "0"
          - key: FLASK_APP_KEY
            generateValue: true
          - key: JWT_SECRET_KEY
            generateValue: true
          - key: PYTHON_VERSION
            value: "3.10.6"
          - key: DATABASE_URL
            fromDatabase:
                name: laverde-db
                property: connectionString
          - key: CLOUDINARY_CLOUD_NAME
            sync: false
          - key: CLOUDINARY_API_KEY
            sync: false
          - key: CLOUDINARY_API_SECRET
            sync: false

    - type: web
      region: ohio
      name: laverde-frontend
      env: static
      buildCommand: "cd tienda-frontend && npm install && npm run build"
      staticPublishPath: "tienda-frontend/build"
      plan: free
      envVars:
          - key: REACT_APP_BACKEND_URL
            value: https://laverde-backend.onrender.com
      routes:
          - type: rewrite
            source: /*
            destination: /index.html

databases:
    - name: laverde-db
      region: ohio
      ipAllowList: []
      plan: free
