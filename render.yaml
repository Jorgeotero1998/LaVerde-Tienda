databases:
  - name: laverde-db
    region: oregon
    plan: free
    ipAllowList: []

services:
  - type: web
    name: laverde-backend
    region: oregon
    plan: free
    env: python
    rootDir: .
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      FLASK_APP=src/app.py PYTHONPATH=src flask db upgrade
      FLASK_APP=src/app.py PYTHONPATH=src flask insert-test-data
    startCommand: PYTHONPATH=src gunicorn "src.app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laverde-db
          property: connectionString
      - key: FLASK_APP
        value: src/app.py
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: src
      - key: JWT_SECRET_KEY
        sync: false
      - key: FLASK_APP_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: laverde-frontend
    env: static
    rootDir: tienda-frontend
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
