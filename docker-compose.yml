services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laverde
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/laverde
      JWT_SECRET_KEY: dev-jwt-secret
      FLASK_APP_KEY: dev-flask-secret
      FRONTEND_URL: http://localhost:3000
      FLASK_ENV: development
    command: >
      sh -c "python -c 'from src.app import app; from api.models import db; ctx=app.app_context(); ctx.push(); db.create_all()'
      && python src/app.py"
    volumes:
      - ./src:/app/src
      - ./instance:/app/instance
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build:
      context: ./tienda-frontend
      dockerfile: Dockerfile.dev
    environment:
      REACT_APP_BACKEND_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./tienda-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:

